<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Helper</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7faff;
        --panel: #ffffff;
        --text: #17324d;
        --muted: #5f7389;
        --border: #d8e2ee;
        --primary: #155eef;
      }

      body {
        margin: 0;
        width: 176px;
        background: var(--bg);
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
      }

      .wrap {
        padding: 10px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px;
        box-shadow: 0 12px 30px rgba(20, 44, 74, 0.1);
      }

      .stack {
        display: grid;
        gap: 8px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        background: var(--primary);
        color: #fff;
      }

      #status {
        min-height: 16px;
        margin-top: 8px;
        font-size: 11px;
        line-height: 1.35;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="stack">
          <button id="extractBtn">Ucitaj</button>
          <button id="fillBtn">Upisi</button>
        </div>
        <div id="status"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
